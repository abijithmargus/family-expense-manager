version: '3.8'

services:
  # Backend API (FastAPI)
  backend:
    build: ./BE
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@host.docker.internal:5432/familymanager
      ENVIRONMENT: ${ENV_NAME:-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "${BE_PORT:-8000}:8000"
    restart: always
    networks:
      - expense_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Ngrok Tunnel (Exposes API to Vercel/Internet)
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
    command: http backend:8000 --log=stdout
    depends_on:
      - backend
    ports:
      - "${NGROK_PORT:-4040}:4040"
    restart: always
    networks:
      - expense_network

  # Cloudflare Tunnel (Free parallel tunnel provider for Staging)
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://backend:8000
    depends_on:
      - backend
    restart: always
    networks:
      - expense_network

networks:
  expense_network:
    driver: bridge