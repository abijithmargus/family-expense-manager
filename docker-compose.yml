version: '3.8'

services:
  # Shared PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: expense_db
    environment:
      POSTGRES_DB: familymanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - expense_network

  # Backend API
  backend:
    build: ./BE
    container_name: ${ENV_NAME:-prod}_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@postgres:5432/familymanager
      ENVIRONMENT: ${ENV_NAME:-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "${BE_PORT:-8000}:8000"
    depends_on:
      - postgres
    restart: always
    networks:
      - expense_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Frontend UI
  frontend:
    build: ./FE
    container_name: ${ENV_NAME:-prod}_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${FE_PORT:-5173}:5173"
    depends_on:
      - backend
    restart: always
    networks:
      - expense_network

  # Cloudflare Tunnel
  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: ${ENV_NAME:-prod}_cloudflare
    # Managed by CI/CD: tunnel --token <TOKEN> or tunnel --url http://frontend:5173
    command: ${CLOUDFLARE_TUNNEL_CMD:-tunnel --url http://frontend:5173}
    depends_on:
      - frontend
    restart: always
    networks:
      - expense_network

  # Ngrok Tunnel (API - only used in specific scenarios)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ${ENV_NAME:-prod}_ngrok
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
    command: http backend:8000 --log=stdout
    depends_on:
      - backend
    ports:
      - "${NGROK_PORT:-4040}:4040"
    restart: always
    networks:
      - expense_network

networks:
  expense_network:
    driver: bridge

volumes:
  postgres_data:
    # Explicitly named to ensure it's shared between docker-compose projects
    external: false