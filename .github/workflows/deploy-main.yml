name: 🚀 Production Deploy (Main Backend)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Production (Port 8000)
    runs-on: [self-hosted, production]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔐 Generate Prod Environment
      run: |
        @"
        ENV_NAME=prod
        BE_PORT=8000
        DB_PORT=5432
        NGROK_PORT=4040
        PROJECT_NAME=finance-prod
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}
        "@ | Out-File -FilePath .env -Encoding UTF8
        Write-Host "✅ Prod .env created"
    
    - name: 🚀 Launch Production Stack
      run: |
        docker compose -p finance-prod down --remove-orphans
        docker compose -p finance-prod build
        docker compose -p finance-prod up -d backend postgres ngrok
        Write-Host "Waiting for services..."
        Start-Sleep -Seconds 12
    
    - name: 🩺 Health Check
      run: |
        $health = Invoke-RestMethod "http://localhost:8000/healthCheck" -ErrorAction Stop
        if ($health.status -eq "ok") {
          Write-Host "✅ Production Backend Healthy" -ForegroundColor Green
        }

    - name: Sync URL to Vercel (Production)
      shell: powershell
      run: |
        # 1. Wait for Ngrok Tunnel (Retry loop)
        $ngrokUrl = ""
        Write-Host "Waiting for Ngrok tunnel..."
        for ($i=0; $i -lt 10; $i++) {
            try {
                $tunnels = Invoke-RestMethod http://localhost:4040/api/tunnels
                $ngrokUrl = $tunnels.tunnels[0].public_url
                if ($ngrokUrl) { break }
            } catch { }
            Start-Sleep -Seconds 3
        }
        
        if (-not $ngrokUrl) {
            Write-Error "Ngrok tunnel failed to start in time!"
            exit 1
        }
        
        $apiUrl = "$ngrokUrl/api/v1"
        Write-Host "Active Ngrok URL: $apiUrl"
        
        # 2. Update Vercel Env (Zero-Dependency API Sync)
        $VERCEL_TOKEN = "${{ secrets.VERCEL_TOKEN }}"
        $PROJECT_NAME = "family-expense-manager"
        $HEADERS = @{ 
            Authorization = "Bearer $VERCEL_TOKEN"
            "Content-Type" = "application/json"
        }

        Write-Host "Syncing URL to Vercel API..."
        
        # A. Find existing Env ID
        $envs = Invoke-RestMethod -Uri "https://api.vercel.com/v10/projects/$PROJECT_NAME/env" -Headers $HEADERS -Method Get
        $targetEnv = $envs.envs | Where-Object { $_.key -eq "VITE_API_URL" -and $_.target -contains "production" }
        
        # B. Delete if exists
        if ($targetEnv) {
            $envId = $targetEnv.id
            Invoke-RestMethod -Uri "https://api.vercel.com/v10/projects/$PROJECT_NAME/env/$envId" -Headers $HEADERS -Method Delete
        }
        
        # C. Add new URL
        $body = @{
            key = "VITE_API_URL"
            value = $apiUrl
            type = "plain"
            target = @("production")
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://api.vercel.com/v10/projects/$PROJECT_NAME/env" -Headers $HEADERS -Method Post -Body $body
        
        # 3. Trigger Production Redeploy (to pick up new env)
        Write-Host "Triggering Vercel Redeploy..."
        $deployBody = @{
            name = $PROJECT_NAME
            gitSource = @{
                type = "github"
                repoId = "897365697" # abijithmargus/family-expense-manager
                ref = "main"
            }
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://api.vercel.com/v13/deployments" -Headers $HEADERS -Method Post -Body $deployBody
    
    - name: 📱 Notify Telegram
      if: success()
      run: |
        $message = "🚀 *PRODUCTION DEPLOY SUCCESSFUL*%0A💎 Status: Backend Online%0A🌐 UI: Synchronized to Vercel%0A🕐 Time: $(Get-Date)"
        curl.exe -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$message&parse_mode=Markdown"

    - name: Cleanup Old Images
      if: always()
      run: |
        docker image prune -f
        Write-Host "Old images purged"
