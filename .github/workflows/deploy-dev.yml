name: 🛠️ Dev Deploy (Staging)

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Staging (Port 8080/5180)
    runs-on: [self-hosted, production]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🔐 Generate Dev Environment
      run: |
        @"
        ENV_NAME=dev
        BE_PORT=8080
        FE_PORT=5180
        NGROK_PORT=4041
        PROJECT_NAME=finance-dev
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}
        CLOUDFLARE_TUNNEL_CMD=tunnel --url http://dev_frontend:5173
        "@ | Out-File -FilePath .env -Encoding UTF8
        Write-Host "✅ Dev .env created"
    
    - name: 🚀 Launch Staging Stack
      run: |
        # Use -p to separate project instances in Docker
        docker-compose -p finance-dev down --remove-orphans
        docker-compose -p finance-dev build --no-cache
        docker-compose -p finance-dev up -d
        Start-Sleep -Seconds 15
    
    - name: 🛰️ Capture Ephemeral URL
      run: |
        $maxRetries = 20
        $retry = 0
        $url = $null
        
        while ($retry -lt $maxRetries -and -not $url) {
          $logs = docker logs dev_cloudflare 2>&1
          if ($logs -match 'https://([a-zA-Z0-9\-]+\.trycloudflare\.com)') {
            $url = $matches[0]
            Write-Host "✅ STAGING URL: $url" -ForegroundColor Cyan
            $url | Out-File -FilePath staging_url.txt -Force
          }
          Start-Sleep -Seconds 2
          $retry++
        }
    
    - name: 🩺 Health Check
      run: |
        $health = Invoke-RestMethod "http://localhost:8080/healthCheck" -ErrorAction Stop
        if ($health.status -eq "ok") {
          Write-Host "✅ Staging Backend Healthy" -ForegroundColor Green
        }
    
    - name: 📱 Notify Telegram
      if: success()
      run: |
        $url = Get-Content staging_url.txt
        $message = "🛠️ *STAGING DEPLOY SUCCESSFUL*%0A🌿 Branch: ${{ github.ref_name }}%0A📱 URL: $url%0A🕐 Time: $(Get-Date)"
        curl.exe -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$message&parse_mode=Markdown"
