name: 🛠️ Dev Deploy (Staging Backend)

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Staging (Port 8080)
    runs-on: [self-hosted, production]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔐 Generate Dev Environment
      run: |
        @"
        ENV_NAME=dev
        BE_PORT=8080
        DB_PORT=5433
        NGROK_PORT=4041
        PROJECT_NAME=finance-dev
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}
        "@ | Out-File -FilePath .env -Encoding UTF8
        Write-Host "✅ Dev .env created"
    
    - name: 🚀 Launch Staging Stack
      run: |
        docker compose -p finance-dev down --remove-orphans
        docker compose -p finance-dev build
        docker compose -p finance-dev up -d backend postgres cloudflared
        Write-Host "Waiting for services..."
        Start-Sleep -Seconds 12
    
    - name: 🩺 Health Check
      run: |
        $health = Invoke-RestMethod "http://localhost:8080/healthCheck" -ErrorAction Stop
        if ($health.status -eq "ok") {
          Write-Host "✅ Staging Backend Healthy" -ForegroundColor Green
        }

    - name: Sync URL to Vercel (Preview)
      shell: powershell
      run: |
        # 1. Scrape Cloudflare Tunnel URL (CMD Bypass Method)
        $cfUrl = ""
        Write-Host "Scraping Cloudflare Tunnel URL..."
        
        for ($i=0; $i -lt 15; $i++) {
            # Use CMD to dump logs to avoid PowerShell 'ErrorStream' crashes
            cmd /c "docker logs finance-dev-cloudflared-1 > cf_logs.txt 2>&1"
            
            if (Test-Path cf_logs.txt) {
                # Read the WHOLE file (Quick Tunnel URL is at the top)
                $match = Get-Content cf_logs.txt | Select-String -Pattern "https://[a-z0-9-]+\.trycloudflare\.com"
                if ($match) {
                    $cfUrl = $match.Matches[0].Value
                    Write-Host "✅ Found URL: $cfUrl"
                    Remove-Item cf_logs.txt -Force
                    break
                }
            }
            Start-Sleep -Seconds 3
        }
        
        if (-not $cfUrl) {
            Write-Host "❌ URL NOT FOUND. Latest log from file:"
            if (Test-Path cf_logs.txt) { Get-Content cf_logs.txt -Tail 10 }
            Write-Error "Cloudflare tunnel URL not found in logs!"
            exit 1
        }
        
        $apiUrl = "$cfUrl/api/v1"
        Write-Host "Active Staging Cloudflare URL: $apiUrl"
        
        # 2. Update Vercel Env (Zero-Dependency API Sync)
        $VERCEL_TOKEN = "${{ secrets.VERCEL_TOKEN }}"
        $PROJECT_NAME = "family-expense-manager"
        $HEADERS = @{ 
            Authorization = "Bearer $VERCEL_TOKEN"
            "Content-Type" = "application/json"
        }

        Write-Host "Syncing URL to Vercel API..."
        
        # A. Find and Delete existing Env IDs (Preview & Development)
        $envs = Invoke-RestMethod -Uri "https://api.vercel.com/v10/projects/$PROJECT_NAME/env" -Headers $HEADERS -Method Get
        $targetEnvs = $envs.envs | Where-Object { $_.key -eq "VITE_API_URL" -and ($_.target -contains "preview" -or $_.target -contains "development") }
        
        foreach ($env in $targetEnvs) {
            $id = $env.id
            Invoke-RestMethod -Uri "https://api.vercel.com/v10/projects/$PROJECT_NAME/env/$id" -Headers $HEADERS -Method Delete
        }
        
        # B. Add new URL for Preview and Development
        $body = @{
            key = "VITE_API_URL"
            value = $apiUrl
            type = "plain"
            target = @("preview", "development")
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://api.vercel.com/v10/projects/$PROJECT_NAME/env" -Headers $HEADERS -Method Post -Body $body
        
        # 3. Trigger Preview Redeploy (to pick up new env)
        Write-Host "Triggering Vercel Preview Redeploy..."
        $deployBody = @{
            name = $PROJECT_NAME
            gitSource = @{
                type = "github"
                repoId = "897365697" # abijithmargus/family-expense-manager
                ref = "dev"
            }
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://api.vercel.com/v13/deployments" -Headers $HEADERS -Method Post -Body $deployBody
    
    - name: 📱 Notify Telegram
      if: success()
      run: |
        $message = "🛠️ *STAGING DEPLOY SUCCESSFUL*%0A🌿 Status: Backend Online%0A🌐 UI: Sync'd to Vercel Preview%0A🕐 Time: $(Get-Date)"
        curl.exe -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$message&parse_mode=Markdown"

    - name: Cleanup Old Images
      if: always()
      run: |
        docker image prune -f
        Write-Host "Old images purged"
