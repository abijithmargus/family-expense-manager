name: 🛠️ Dev Deploy (Staging Backend)

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  DOCKER_PROJECT: finance-dev
  BE_PORT: 8080
  NGROK_API_PORT: 4041

jobs:
  deploy:
    name: Deploy Backend to Staging
    runs-on: [self-hosted, staging]  # Fixed: staging label, not production
    
    steps:
      - name: 📥 Checkout Backend
        uses: actions/checkout@v4  # Updated to v4
      
      - name: 📥 Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}  # Or your FE repo
          path: ./FE
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            FE/

      - name: 🔐 Generate Dev Environment
        shell: pwsh
        run: |
          $envContent = @"
          ENV_NAME=dev
          BE_PORT=${{ env.BE_PORT }}
          NGROK_PORT=${{ env.NGROK_API_PORT }}
          PROJECT_NAME=${{ env.DOCKER_PROJECT }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}
          "@
          
          # Secure: restrict permissions
          $envContent | Out-File -FilePath .env -Encoding UTF8 -NoNewline
          if ($IsLinux -or $IsMacOS) { chmod 600 .env }
          
          Write-Host "✅ Dev .env created (restricted permissions)"

      - name: 🚀 Launch Staging Stack
        shell: pwsh
        run: |
          docker-compose -p ${{ env.DOCKER_PROJECT }} down --remove-orphans --timeout 30
          
          # Pull latest images if using registry, else build
          docker-compose -p ${{ env.DOCKER_PROJECT }} build --no-cache
          docker-compose -p ${{ env.DOCKER_PROJECT }} up -d
          
          Write-Host "⏳ Waiting for services (max 60s)..."
          $maxAttempts = 12
          $attempt = 0
          
          while ($attempt -lt $maxAttempts) {
            Start-Sleep -Seconds 5
            try {
              $health = Invoke-RestMethod "http://localhost:${{ env.BE_PORT }}/healthCheck" -TimeoutSec 5
              if ($health.status -eq "ok") {
                Write-Host "✅ Backend healthy" -ForegroundColor Green
                exit 0
              }
            } catch {
              Write-Host "⏳ Attempt $($attempt + 1)/$maxAttempts..." -ForegroundColor Yellow
            }
            $attempt++
          }
          
          Write-Error "❌ Health check failed after 60s"
          exit 1

      - name: 🔍 Verify Ngrok Tunnel
        id: ngrok
        shell: pwsh
        run: |
          $maxAttempts = 10
          $attempt = 0
          $ngrokUrl = $null
          
          while ($attempt -lt $maxAttempts -and -not $ngrokUrl) {
            try {
              $tunnels = Invoke-RestMethod "http://localhost:${{ env.NGROK_API_PORT }}/api/tunnels" -TimeoutSec 5
              
              # Find HTTPS tunnel specifically
              $httpsTunnel = $tunnels.tunnels | Where-Object { $_.proto -eq "https" } | Select-Object -First 1
              
              if ($httpsTunnel) {
                $ngrokUrl = $httpsTunnel.public_url
                $apiUrl = "$ngrokUrl/api/v1"
                
                Write-Host "📍 Ngrok HTTPS: $ngrokUrl"
                Write-Host "📍 API URL: $apiUrl"
                
                # Set outputs for next steps
                "ngrok_url=$ngrokUrl" >> $env:GITHUB_OUTPUT
                "api_url=$apiUrl" >> $env:GITHUB_OUTPUT
                exit 0
              }
            } catch {
              Write-Host "⏳ Waiting for ngrok tunnel ($($attempt + 1)/$maxAttempts)..." -ForegroundColor Yellow
            }
            
            Start-Sleep -Seconds 3
            $attempt++
          }
          
          Write-Error "❌ Ngrok tunnel not found"
          exit 1

      - name: ⚡ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🛰️ Sync URL to Vercel
        shell: pwsh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          
          $apiUrl = "${{ steps.ngrok.outputs.api_url }}"
          
          # Use vercel env pull/push pattern (more reliable)
          # Or use Vercel API directly for atomic update
          
          $headers = @{
            Authorization = "Bearer $env:VERCEL_TOKEN"
            "Content-Type" = "application/json"
          }
          
          # Delete existing env vars (ignore errors)
          try {
            $existing = Invoke-RestMethod -Uri "https://api.vercel.com/v9/projects/$env:VERCEL_PROJECT_ID/env?teamId=$env:VERCEL_ORG_ID" -Headers $headers -Method GET
            $targetId = ($existing.envs | Where-Object { $_.key -eq "VITE_API_URL" -and $_.target -contains "preview" }).id
            if ($targetId) {
              Invoke-RestMethod -Uri "https://api.vercel.com/v9/projects/$env:VERCEL_PROJECT_ID/env/$targetId?teamId=$env:VERCEL_ORG_ID" -Headers $headers -Method DELETE | Out-Null
            }
          } catch { }
          
          # Create new env var
          $body = @{
            key = "VITE_API_URL"
            value = $apiUrl
            target = @("preview", "development")
            type = "plain"
          } | ConvertTo-Json -Depth 10
          
          Invoke-RestMethod -Uri "https://api.vercel.com/v9/projects/$env:VERCEL_PROJECT_ID/env?teamId=$env:VERCEL_ORG_ID" -Headers $headers -Method POST -Body $body | Out-Null
          
          Write-Host "✅ VITE_API_URL updated: $apiUrl"

      - name: 🔄 Trigger Vercel Redeploy
        shell: pwsh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Deploy frontend with new env
          cd FE
          
          # Link project (if not already linked)
          # vercel link --token $env:VERCEL_TOKEN --yes --project ${{ secrets.VERCEL_PROJECT_ID }}
          
          # Deploy to preview
          vercel deploy --token $env:VERCEL_TOKEN --yes --target=preview

      - name: 🧹 Cleanup
        if: always()
        shell: pwsh
        run: |
          Remove-Item .env -Force -ErrorAction SilentlyContinue
          Write-Host "🧹 Cleaned up .env file"

      - name: 📱 Notify Telegram
        if: success()
        shell: pwsh
        run: |
          $message = @"
          🛠️ *STAGING DEPLOY SUCCESSFUL*
          
          🌿 Backend: Online (Port ${{ env.BE_PORT }})
          🌐 Ngrok: ${{ steps.ngrok.outputs.ngrok_url }}
          🔗 API: ${{ steps.ngrok.outputs.api_url }}
          🚀 Frontend: Redeployed to Vercel Preview
          ⏱️ Duration: $([math]::Round($(Get-Date).Subtract($(Get-Date).AddMinutes(-5)).TotalMinutes, 1))m
          "@
          
          $encodedMessage = [uri]::EscapeDataString($message)
          
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body @{
            chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
            text = $message
            parse_mode = "Markdown"
            disable_notification = $false
          } | Out-Null

      - name: 🚨 Notify Failure
        if: failure()
        shell: pwsh
        run: |
          $message = "❌ *STAGING DEPLOY FAILED*%0A🔍 Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body @{
            chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
            text = $message
            parse_mode = "Markdown"
          } | Out-Null
