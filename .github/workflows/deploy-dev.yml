name: 🛠️ Dev Deploy (Staging Backend)

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Staging (Port 8080)
    runs-on: [self-hosted, production]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔐 Generate Dev Environment
      run: |
        @"
        ENV_NAME=dev
        BE_PORT=8080
        DB_PORT=5433
        NGROK_PORT=4041
        PROJECT_NAME=finance-dev
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}
        "@ | Out-File -FilePath .env -Encoding UTF8
        Write-Host "✅ Dev .env created"
    
    - name: 🚀 Launch Staging Stack
      run: |
        docker compose -p finance-dev down --remove-orphans
        docker compose -p finance-dev build
        docker compose -p finance-dev up -d
        Write-Host "Waiting for services..."
        Start-Sleep -Seconds 12
    
    - name: 🩺 Health Check
      run: |
        $health = Invoke-RestMethod "http://localhost:8080/healthCheck" -ErrorAction Stop
        if ($health.status -eq "ok") {
          Write-Host "✅ Staging Backend Healthy" -ForegroundColor Green
        }

    - name: Sync URL to Vercel (Preview)
      shell: powershell
      run: |
        # 1. Wait for Ngrok Tunnel (Retry loop)
        $ngrokUrl = ""
        Write-Host "Waiting for Ngrok tunnel..."
        for ($i=0; $i -lt 10; $i++) {
            try {
                $tunnels = Invoke-RestMethod http://localhost:4041/api/tunnels
                $ngrokUrl = $tunnels.tunnels[0].public_url
                if ($ngrokUrl) { break }
            } catch { }
            Start-Sleep -Seconds 3
        }
        
        if (-not $ngrokUrl) {
            Write-Error "Ngrok tunnel failed to start in time!"
            exit 1
        }
        
        $apiUrl = "$ngrokUrl/api/v1"
        Write-Host "Active Staging Ngrok URL: $apiUrl"
        
        # 2. Update Vercel Env (Check if installed first)
        $VERCEL_TOKEN = "${{ secrets.VERCEL_TOKEN }}"
        if (!(Get-Command vercel -ErrorAction SilentlyContinue)) {
            Write-Host "Installing Vercel CLI..."
            npm install -g vercel@latest
        }

        try { vercel env rm VITE_API_URL preview --token $VERCEL_TOKEN --yes } catch { }
        vercel env add VITE_API_URL preview --token $VERCEL_TOKEN --yes $apiUrl
        try { vercel env rm VITE_API_URL development --token $VERCEL_TOKEN --yes } catch { }
        vercel env add VITE_API_URL development --token $VERCEL_TOKEN --yes $apiUrl
        
        # 3. Trigger Preview Build on Vercel
        cd FE
        vercel --token $VERCEL_TOKEN --yes
    
    - name: 📱 Notify Telegram
      if: success()
      run: |
        $message = "🛠️ *STAGING DEPLOY SUCCESSFUL*%0A🌿 Status: Backend Online%0A🌐 UI: Sync'd to Vercel Preview%0A🕐 Time: $(Get-Date)"
        curl.exe -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$message&parse_mode=Markdown"

    - name: Cleanup Old Images
      if: always()
      run: |
        docker image prune -f
        Write-Host "Old images purged"
